# Validates the session cookie against the baked-in token.
# __TT_ACCESS_TOKEN__ is replaced by 10-token-setup.sh at container start.
map $cookie_tt_access_token $valid_access {
    default               0;
    "__TT_ACCESS_TOKEN__" 1;
}

server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Internal auth subrequest — 204 if cookie valid, 403 if not
    location = /__auth {
        internal;
        if ($valid_access = "1") { return 204; }
        return 403;
    }

    # Grant endpoint — validates ?token=..., sets session cookie, redirects to /
    location = /__grant {
        if ($arg_token != "__TT_ACCESS_TOKEN__") {
            return 403 "Invalid or missing token.";
        }
        add_header Set-Cookie "tt_access_token=__TT_ACCESS_TOKEN__; Path=/; HttpOnly; SameSite=Strict";
        return 302 /;
    }

    # Unprotected health check for Docker healthcheck
    location = /__health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /models-api/ {
        auth_request /__auth;
        error_page 403 = @forbidden;
        proxy_pass         http://tt-studio-backend-api:8000/models/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1200s;
        add_header         X-Accel-Buffering no;
    }

    location /board-api/ {
        auth_request /__auth;
        error_page 403 = @forbidden;
        proxy_pass http://tt-studio-backend-api:8000/board/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docker-api/ {
        auth_request /__auth;
        error_page 403 = @forbidden;
        proxy_pass http://tt-studio-backend-api:8000/docker/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logs-api/ {
        auth_request /__auth;
        error_page 403 = @forbidden;
        proxy_pass http://tt-studio-backend-api:8000/logs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /collections-api/ {
        auth_request /__auth;
        error_page 403 = @forbidden;
        proxy_pass http://tt-studio-backend-api:8000/collections/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /vector-db-api/ {
        auth_request /__auth;
        error_page 403 = @forbidden;
        proxy_pass http://tt-studio-backend-api:8000/collections/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        auth_request /__auth;
        error_page 403 = @forbidden;
        try_files $uri $uri/ /index.html;
    }

    location @forbidden {
        return 403 "Access denied. Use the secret link to access this application.";
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
