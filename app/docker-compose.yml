#
# Main compose file. Service definitions live in their respective
# folders; this file assembles them via `include:` and declares the
# shared external network. Mode-specific tweaks are applied via the
# docker-compose.dev-mode.yml / .prod.yml / .tt-hardware.yml overlays.

include:
  - ./backend/docker-compose.yml
  - ./frontend/docker-compose.yml
  - ./agents/docker-compose.yml
  - ./chroma/docker-compose.yml

networks:
  tt_studio_network:
    # need external flag to allow for the backend to manage the docker network
    # otherwise, docker compose will create an app_* network for the backend container
    # to avoid colliding existing docker networks
    external: true
    name: tt_studio_network
