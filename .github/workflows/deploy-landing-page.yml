name: Deploy landing page to GitHub Pages

# Publishes docs/website/ as the root of the GitHub Pages site.
# One-time setup: in repo Settings → Pages, set "Build and deployment"
# Source to "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "docs/website/**"
      - ".github/workflows/deploy-landing-page.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload landing page artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
